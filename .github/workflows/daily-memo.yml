name: Daily HK China memo

on:
  workflow_dispatch:
    inputs:
      generate:
        description: Generate a new memo before deployment
        required: true
        default: true
        type: boolean
  schedule:
    - cron: "40 6 * * *"
      timezone: "Asia/Hong_Kong"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-memo
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Check HK trading day
        id: calendar
        run: python scripts/trading_calendar.py
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Generate and validate memo
        if: inputs.generate || (github.event_name == 'schedule' && steps.calendar.outputs.is_trading_day == 'true')
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5.6-sol
          EDITION_MODE: ${{ github.event_name == 'workflow_dispatch' && 'intraday' || 'preopen' }}
        run: python scripts/generate_memo.py
      - name: Build public site
        run: python scripts/build_site.py
      - name: Save successful memo
        if: inputs.generate || (github.event_name == 'schedule' && steps.calendar.outputs.is_trading_day == 'true')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add memos docs
          git diff --cached --quiet || git commit -m "memo: $(date -u +%F)"
          git push
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
